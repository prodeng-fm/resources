# context.toml — information architecture schema for the harness repo
#
# Declares the document types this repo recognizes, where each type
# lives, and what frontmatter fields each type requires. The classify
# command walks the tree and validates every doc against this schema.
# The index command emits per-type manifests derived from valid docs.

[base]
# Fields required on every doc, regardless of type.
required = ["id", "type", "title", "created", "tags"]
optional = ["status", "updated", "supersedes", "superseded_by"]

[classify]
# Directories the classifier should skip entirely.
ignore = [
  ".git",
  "dist",
  "node_modules",
  "vendor",
  # Acceptance-spec fixtures are deliberately malformed test data —
  # they are not docs and must not be validated.
  "docs/acceptance/*.fixture",
]

[types.adr]
# Architecture Decision Records. Capture a decision, its context, and
# its consequences. Append-only — supersede rather than edit.
directory = "docs/adrs"
required = ["decision", "consequences"]

[types.spec]
# Implementation specs. Prose contracts describing what a command,
# subsystem, or component does. Harvested from working code, not
# speculated.
directory = "docs/specs"
required = ["scope", "contract"]

[types.acceptance]
# Executable specifications. Each acceptance spec is a single
# markdown file at docs/acceptance/<name>.md whose body interleaves
# prose with fenced sh code blocks. Each sh block is one assertion:
# the first non-comment line is the command; recognized comment-line
# annotations declare expectations:
#   # exit: <int>             (default 0 if omitted)
#   # stdout contains: <substring>
#   # stderr contains: <substring>
# Multiple "contains" lines are AND-conjoined. Fixtures, when
# needed, live in a sibling docs/acceptance/<name>.fixture/ directory
# the runner copies to a tempdir before each block runs. Future
# `harness acceptance run` will extract and execute the blocks.
# ADR-0005 records the format decision.
directory = "docs/acceptance"
required = ["exercises"]
